spring:
  application:
    name: LicenseManagementService
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lms
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: true
        format_sql: true
        use_sql_comments: true
        ddl-auto: none
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET_KEY}

logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql: trace