spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:mysql:8.0:///test?TC_REUSABLE=true
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: false
        format_sql: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: myTestSecretKeyForJwtThatIsLongEnough1234
